<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados en Vivo - Competencias Locales</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
}

.header{
  padding:25px 15px;
  background:#000;
  border-bottom:2px solid #b87333;
}

.header img{
  width:110px;
  border-radius:50%;
  border:3px solid #b87333;
}

.header h1{
  margin:15px 0 5px;
  font-size:20px;
}

.header p{
  font-size:13px;
  color:#ccc;
}

.header a{
  color:#b87333;
  text-decoration:none;
  font-weight:bold;
}

.buttons{
  margin:30px 0;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:14px 30px;
  background:#b87333;
  color:white;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
}

.btn:hover{
  background:#8a4b1c;
}

.content{
  width:95%;
  max-width:1000px;
  margin:20px auto 60px;
  text-align:left;
}

.section-title{
  font-size:18px;
  margin:30px 0 10px;
  color:#b87333;
  border-bottom:1px solid #333;
  padding-bottom:5px;
}

.card{
  background:#1a1a1a;
  padding:12px;
  margin-bottom:8px;
  border-radius:4px;
  border-left:4px solid #b87333;
}

.loading{
  text-align:center;
  margin-top:30px;
  color:#aaa;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/zB74zfKK/Logo-Kennel.jpg">
  <h1>Planilla Electrónica - Competencias LOCALES</h1>
  <p>
    Desarrollada por 
    <a href="https://ehenquin.github.io/LinkTreePro/" target="_blank">
      Dr. Eduardo R. Henquín
    </a>
  </p>
</div>

<div class="buttons">
  <div class="btn" onclick="modo='razas'; cargar()">Resultados Razas</div>
  <div class="btn" onclick="modo='bis'; cargar()">Finales BIS</div>
</div>

<div id="contenido" class="content">
  <div class="loading">Seleccione una opción.</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwT50gHRrJxqhx1jp6PKL1Fp4lxe5H2Kft60U1uUAjokLqoI2x2rpwqczWRab_PsAzVtw/exec";

let modo = null;

async function cargar(esSilencioso = false){

  if(!modo) return;

  // Solo mostramos "Cargando..." si no es una actualización de fondo
  if(!esSilencioso) {
    document.getElementById("contenido").innerHTML =
      '<div class="loading">Actualizando resultados...</div>';
  }

  try{
    const res = await fetch(API + "?tipo=" + modo);
    const data = await res.json();
    render(data);
  }catch(e){
    if(!esSilencioso) {
      document.getElementById("contenido").innerHTML =
        '<div class="loading">Error de conexión</div>';
    }
  }
}

function render(data) {
  const contenedor = document.getElementById("contenido");
  if (!data || data.length === 0) {
    contenedor.innerHTML = '<div class="loading">Sin resultados aún</div>';
    return;
  }

  // 1. Ordenar datos: Pista -> Juez -> Categoría
  data.sort((a, b) => {
    const pistaA = String(a.pista || 'ZZZ');
    const pistaB = String(b.pista || 'ZZZ');
    if (pistaA !== pistaB) return pistaA.localeCompare(pistaB);

    const juezA = String(a.juez || 'ZZZ');
    const juezB = String(b.juez || 'ZZZ');
    if (juezA !== juezB) return juezA.localeCompare(juezB);

    return (a.categoria || '').localeCompare(b.categoria || '');
  });

  let html = "";
  let ultimoJuez = "";
  let ultimaCat = "";

  data.forEach(item => {
    const juezActual = `${item.pista || "SP"}-${item.juez || "SJ"}`;
    const catActual = item.categoria || "Sin Categoría";

    // DIVISION DE JUEZ
    if (juezActual !== ultimoJuez) {
      const txtPista = item.pista ? `Pista ${item.pista}` : "Pista -";
      const txtJuez = item.juez ? `Juez: ${item.juez}` : "Juez -";
      
      html += `
        <div class="section-title" style="margin-top:40px; border-bottom:3px solid #b87333; font-size:20px;">
          ${txtPista} | ${txtJuez}
        </div>
      `;
      ultimoJuez = juezActual;
      ultimaCat = ""; 
    }

    // DIVISION DE CATEGORÍA
    if (catActual !== ultimaCat) {
      html += `
        <div style="background:#333; color:#b87333; padding:5px 10px; margin:15px 0 10px; font-weight:bold; font-size:14px; text-transform:uppercase; border-left:10px solid #b87333;">
          Categoría: ${catActual}
        </div>
      `;
      ultimaCat = catActual;
    }

    // TARJETA DEL PERRO (Modificado el formato del título)
    html += `
      <div class="card">
        <div style="margin-bottom: 5px;">
          <strong>#${item.numero} - ${item.raza} | ${item.categoria} | ${item.sexo}</strong>
          <span style="float:right; color:#b87333; font-weight:bold;">
            ${item.puesto ? item.puesto + "°" : ""}
            ${item.calificacion ? " [" + item.calificacion + "]" : ""}
          </span>
        </div>
        <div style="font-size: 11px; color: #888;">
          ${item.tipoBis || ""}
        </div>
      </div>
    `;
  });

  contenedor.innerHTML = html;
}





// Auto refresh cada 5 segundos en modo silencioso (sin parpadeos)
setInterval(() => {
  if (modo) {
    cargar(true);
  }
}, 5000);
</script>

</body>
</html>
